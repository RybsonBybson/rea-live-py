name: Deploy Vite to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Deploy Static Page
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./static
          publish_branch: static

      - name: Push server-only branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout -B server || git checkout server

          git rm -r --cached . || true

          mkdir -p temp_server
          cp -r server/* temp_server/
          rm -rf server
          mv temp_server/* .
          rm -rf temp_server

          git add .
          git commit -m "Update server-only branch" || echo "Nothing to commit"

          git push origin server --force
