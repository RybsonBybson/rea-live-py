name: Deploy Vite to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Deploy Static Page
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./static
          publish_branch: static

      - name: Push server-only branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Tworzymy pusty branch (orphan) – nie dziedziczy main
          git checkout --orphan server

          # Usuń wszystkie pliki z indexu
          git rm -rf . || true

          # Dodaj tylko folder server
          if [ -d "server" ]; then
            cp -r server/* .
            git add .
            git commit -m "Initial commit with server content"
            git push origin server --force
          else
            echo "Folder server nie istnieje, branch server nie zostanie utworzony"
          fi
